_target_: opr.losses.contrastive.MultimodalContrastiveLoss

pos_margin: 0.0
neg_margin: 0.4
distance:
  _target_: pytorch_metric_learning.distances.LpDistance
  normalize_embeddings: False
  collect_stats: True
miner:
  _target_: opr.miners.all_pairs_miner.AllPairsMiner
  distance:
    _target_: pytorch_metric_learning.distances.LpDistance
    normalize_embeddings: False
reducer:
  _target_: pytorch_metric_learning.reducers.AvgNonZeroReducer
  collect_stats: True
modalities: [image, semantic, fusion]
weights: [0.5, 0.5, 0.]
